<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Smart Civic{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3">

    <a class="navbar-brand" href="/dashboard">🚀 Smart Civic</a>

    <div>

        <a class="btn btn-light btn-sm" href="/dashboard">Dashboard</a>
        <a class="btn btn-light btn-sm" href="/profile">Profile</a>
        <a class="btn btn-light btn-sm" href="/my_complaints">Complaints</a>
        <a class="btn btn-light btn-sm" href="/analytics">Analytics</a>

        {% if current_user.role == "admin" %}
            <a class="btn btn-warning btn-sm" href="/admin">Admin</a>
        {% endif %}

        <a class="btn btn-danger btn-sm" href="/logout">Logout</a>

    </div>

</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
